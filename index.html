# Motivation - What is Speech Modeling?

???
To set the stage for our work, let's first look at the anatomy of modern speech modeling. 



---
class: middle
## Modeling the Complexity of Speech

.bold[*The Goal of Speech Modeling:*] To analyze, manipulate, and synthesize speech by decomposing it into controllable factors

.center.width-90[![](images/RT-MAE/INTRODUCTION.svg)]

.boite-90[$$ A\_{1:N} = \texttt{Encoder}(X) \quad ; \quad \hat{X} = \texttt{Decoder}(A) $$]

*The Dual Challenge:*
- **High Fidelity:** Artifact-free and realistic audio quality.
- **Controllability:** Fine-grained control over factors like pitch, speaker identity, and content.
<!--.italic[But are these explicit attributes enough to capture the full richness of natural speech?]-->

???
The ultimate goal in this field is to analyze, manipulate, and synthesize speech. To do this effectively, we have to take a highly complex audio signal and decompose it into a set of simpler, controllable factors. 

If you look at the diagram, you can see the standard pipeline. It begins with an **Analysis** step, acting as an Encoder. Here, we take the raw speech waveform—which we denote as $X$—and map it to a set of explicit attributes, $A$. These core attributes typically include the linguistic content (the 'what'), the loudness (the volume), the speaker identity (the 'who'), and the pitch (the melody). 

Once these factors are isolated, we achieve our **Control** phase. Much like a sound engineer at a mixing board, we can adjust these attributes independently. Finally, we pass them into a **Generation** step, or Decoder, which uses a vocoder to synthesize the new audio waveform, $\hat{X}$. Mathematically, this is simply $A = \text{Encoder}(X)$ and $\hat{X} = \text{Decoder}(A)$.

However, designing this pipeline presents a **Dual Challenge**. First, we need **High Fidelity**—the output must be completely realistic and free of artifacts. Second, we need precise **Controllability** over these explicit factors. 

This framework is the foundation of our field. But as we will see in the next few slides, trying to model the full complexity of human speech using *only* these explicit attributes leaves a critical gap."

---
class: middle
## Modeling the Complexity of Speech: <u>Neural Audio Codecs</u>

.bold[*The Paradigm:*] Deep learning-based end-to-end architectures for speech modeling. <br>
.bold[*Core Mechanism:*] Compressing continuous speech signals into low-bitrate discrete units.

.center.width-90[![](images/RT-MAE/nacs.svg)]

.boite-90[$$z = \texttt{Encoder}(X), \, \hat{X} = \texttt{Decoder}(z)$$]

*Limitations for Control:* Excellent for reconstruction, but the discrete units entangle content, pitch, and speaker identity, making explicit control difficult.

???

Today, the dominant approach uses Neural Audio Codecs. An encoder compresses raw speech into a bottleneck of low-bitrate discrete tokens—our latent variable, $z$. A decoder then resynthesizes the final waveform, $\hat{X}$. 

While these codecs achieve incredible, high-fidelity reconstruction, they fail completely at controllability. Because they compress everything blindly, attributes like content, pitch, and identity become hopelessly entangled in the same latent space. You can't manipulate one without altering the others.


---
class: middle
## Modeling the Complexity of Speech: <u>Polyak model</u>

.bold[*The Paradigm:*] Separating speech into distinct, controllable representations. <br>
.bold[*Core Mechanism:*] Recombining these disentangled streams to generate high-quality.

.center.width-90[![](images/RT-MAE/polyak.svg)]

.boite-90[
$$\hat{X} = \text{Decoder}(A^{cont.}\_{1}, A^{f\_0}\_{2}, A^{speak.}\_{3})$$
]

*The Bottleneck:* Unmodeled residual information is absorbed as dataset bias, limiting generalization and control.

.credit[Polyak, A., Adi, Y., Copet, J., Kharitonov, E., Lakhotia, K., Hsu, W. N., ... & Dupoux, E. (2021). Speech resynthesis from discrete disentangled self-supervised representations. arXiv preprint arXiv:2104.00355.]

???
"To fix the entanglement issue, the Polyak model shifts to **disentanglement**. Instead of a single black box, the audio is split into explicit streams: linguistic Content, Pitch, and Speaker Identity. This restores our control board, allowing us to manipulate features independently before synthesizing the audio. 

**But there's a bottleneck.** By relying *only* on these explicit variables, we lose human expressivity. The unmodeled 'residual'—like emotion and micro-prosody—is simply absorbed as dataset bias. And this exact limitation brings us to our baseline model..."

---
class: middle
## Modeling the Complexity of Speech: <u>$\texttt{AnCoGen}$ .small[(Sadok et al. 2025)]</u>

.bold[*The Paradigm:*] A unified Transformer-based Masked Autoencoder (MAE) for speech. <br>
.bold[*Core Mechanism:*] Learns a bidirectional mapping between Mel-Spec. and explicit attributes.

.center.width-90[![](images/RT-MAE/ancogen.svg)]

.boite-90[
$$ \hat{X} = \text{MAE}(A^{cont.}\_{1}, A^{pitch}\_{2}, A^{speak.}\_{3}, A^{loud}\_{4}, A^{noise}\_{5}) $$
]

*The Bottleneck:* Like previous models, it reconstructs speech solely from a finite set of explicit attributes, discarding the natural residual variance.

.credit[Sadok, S., Leglaive, S., Girin, L., Richard, G., & Alameda-Pineda, X. (2025, April). Ancogen: Analysis, control and generation of speech with a masked autoencoder. In ICASSP 2025 (pp. 1-5). IEEE.]
???
This brings us to our baseline model: AnCoGen.

It elegantly unifies the whole process using a Masked Autoencoder. Instead of separate modules, it performs both analysis and generation in a single framework, mapping the audio directly to our four explicit attributes.

But despite this great architecture, it hits the same wall. Because it reconstructs speech strictly from this finite set of attributes, it discards the natural residual variance. The true richness of the voice is lost.

So, how do we capture this missing residual?

## The Limitation of Explicit Modeling

*The Illusion of Completeness:* Explicit attributes (pitch, content, identity, loudness) alone cannot capture the full richness of natural speech.

.center.width-80[![](images/RT-MAE/problem.svg)]
.boite-90[
<!-- $$ X\_{natural} \sim \text{Model}(A\_{explicit}) $$ -->
$$ X\_{natural} = \text{Model}(A\_{1:N} + \mathcal{R})$$
]

*The Challenge:* Fully explaining speech would require an impractically large (or unbounded) set of explicit attributes.

???

This brings us to the core limitation. Relying solely on explicit attributes creates an illusion of completeness. 

As you can see in the diagram, our acoustic model captures the basic synthesized speech—the orange parts—but misses the blue parts: the unmodeled residual. Mathematically, natural speech is the combination of these explicit features *plus* this unknown residual $\mathcal{R}$. 

Since defining an infinite number of explicit attributes is impossible, we need a new way to capture this missing information.

# The Proposed Model

## RT-MAE:  Residual Tokens Enhance Masked Autoencoders For Speech Modeling

---
class: middle, blue-slide

## Background to $\texttt{AnCoGen}$

.center.width-100[![](images/method/overall.svg)]
.caption[Overall architecture of $\texttt{AnCoGen}$, to read from left (input) to right (output).]

???
Let's start by introducing AnCoGen in a bit more detail. Here is the overall architecture.
---
class: middle
count: false

## Background to $\texttt{AnCoGen}$

.center.width-100[![](images/method/overall-1.svg)]
.caption[(1) Speech representations (Inputs) & Token representations.]

- AnCoGen utilizes two speech signal representations: .bold[Mel-spectrogram representation (MS)] and .bold[High-level attributes representation] ($A\_{1:6}$)

- Mel-spectrogram tokens come from the discrete latent space of a pre-trained, frozen .bold[VQ-VAE], while speech attribute tokens are obtained by .bold[quantizing] six speech attributes ($A\_{1:6}$).

???
In step one, we prepare our inputs. AnCoGen relies on two parallel streams.

First, the Mel-spectrogram is converted into discrete tokens using a pre-trained, frozen VQ-VAE. Second, our six high-level speech attributes—such as pitch, identity, and loudness—are independently quantized into their own set of tokens.

Now, both the audio and the explicit control factors share a common, discrete format, ready for the next step.

---
class: middle
count: false

## Background to $\texttt{AnCoGen}$

.center.width-100[![](images/method/overall-2.svg)]
.caption[(2) Masking strategy.]

- Training $\texttt{AnCoGen}$ is achieved by *randomly masking* the input sequences of mel-spectrogram and speech attributes tokens.
- .bold[Coupled masking strategy:]  The masking ratio for these two speech representations is drawn randomly according to a *uniform distribution* on the 1-simplex.

???
In step two, we apply our masking strategy.

During training, we randomly mask portions of both the Mel-spectrogram and the attribute tokens. Crucially, these masks are coupled: we draw a random ratio p from a uniform distribution. We mask p percent of the spectrogram, and exactly 1−p percent of the attributes.

This forces the network to constantly translate between the audio and its explicit controls, learning a strong bidirectional mapping

---
class: middle
count: false

## Background to $\texttt{AnCoGen}$

.center.width-100[![](images/method/overall-3.svg)]
.caption[(3) Encoder-decoder architecture.]

- We use a *masked autoencoder (MAE)* .blue.small[(He et al., 2022)] model to learn a bidirectional mapping between a Mel-spectrogram and the speech attributes.
- The model (encoder, decoder, codebooks and mask token) is trained by computing the **cross-entropy loss** between the predicted and ground-truth discrete tokens.

???
Finally, in step three, these masked sequences are fed into our Transformer-based Masked Autoencoder.

The encoder processes only the visible tokens, while the decoder is tasked with reconstructing the missing ones. The entire architecture is trained end-to-end using a simple cross-entropy loss between the predicted tokens and the ground-truth. This is what allows AnCoGen to successfully learn that bidirectional mapping between audio and attributes.

---
class: middle

## RT-MAE

.center.width-80[![](images/RT-MAE/rtmae.svg)]

.caption[Overview of the proposed RT-MAE architecture. ]

- .blue[Top (Blue): Current MAE paradigm modeling explicit attributes.] 
- .purple[Bottom (Purple): Novel trainable queries capturing the missing residual information.]

???
Now, we arrive at the core novelty of our paper: RT-MAE.

If you look at the diagram, the top section in blue represents the current paradigm we just discussed—our baseline, which only models explicit attributes. The real breakthrough is the bottom section, highlighted in purple.

---
class: middle
count: false

## Capturing the Residual $\mathcal{R}$: The Cross-Attention Mechanism

Inspired by the Perceiver architecture .blue.small[(Jaegle et al., 2021)], we address these challenges by introducing a fixed-size set of learnable queries $Q$ that interact with the input through cross-attention.

.center.width-80[![](images/RT-MAE/rtmae-1.svg)]

.credit[Jaegle, A., Borgeaud, S., Alayrac, J. B., Doersch, C., Ionescu, C., Ding, D., ... & Carreira, J. (2021). Perceiver io: A general architecture for structured inputs & outputs. arXiv preprint arXiv:2107.14795.]

???
"So, how do we actually integrate this missing residual $R$ into the AnCoGen framework?

We drew inspiration from the Perceiver architecture. As highlighted in the red box on the bottom left, we introduce a fixed-size set of learnable queries, $Q$. These queries interact directly with the encoded audio through a cross-attention mechanism.

Essentially, they act as a targeted filter. They scan the input to extract all the unmodeled characteristics left behind by the explicit attributes, forming our residual tokens $\mathcal{R}$."
---
class: middle, blue-slide

## RT-MAE at inference

The masking depends on the task: .boxed[**Speech analysis**]

.center.width-70[![](images/analysis.svg)]

For .bold[speech analysis], the speech attributes are not available, and they are thus totally masked at the input and estimated by the 
*Melspectrogram-to-speech attributes* mapping.

---
class: middle, blue-slide

## RT-MAE at inference

The masking depends on the task: .boxed[**Speech generation**]

.center.width-70[![](images/generation.svg)]

For .bold[speech generation], the Mel-spectrogram is not available, and it is thus totally masked at the input and estimated by the 
*(residual tokens+attributes)-to-melspectrogram* mapping.

---
class: middle, blue-slide
exclude: true

## AnCoGen at inference

The masking depends on the task: .boxed[**Speech control**]

.center.width-90[![](images/control.svg)]

For .bold[speech control], the speech attributes are *controlled* between the analysis and generation stage in order to perform pitch shifting, speech enhancement, de-reverberation ...

---
class: middle
.kol-2-3[
## Regularization strategy
Without regularization, residual tokens can encode *all* the information needed to reconstruct the Mel-spectrogram.

.center.width-40[![](images/RT-MAE/generation.svg)]

- In this case, the model **rely primarily** on the residual tokens, which do not use the
attributes,
- **limiting controllability** and compromising **interpretability** in speech generation.

]
.kol-1-3[
.center.width-60[![](images/RT-MAE/ICASSP_Modern_Plots-1.svg)]
]


???
But adding these residual tokens introduces a trap. Without regularization, Look at the graphs on the right.

When we force this unregularized model to generate speech using only the explicit attributes—the dark grey bars—the scores drop drastically. Why? Because the model became lazy during training. It used the residual tokens to encode all the information and completely ignored our explicit attributes.

While the green bars show great reconstruction when the residuals are present, this shortcut destroys our controllability. To fix this, we needed a regularization strategy."

---
class: middle
count: false

## Regularization strategy: dropout

We introduce a **dropout-based regularization mechanism** applied to the residual tokens.

.center.width-80[![](images/RT-MAE/rtmae-2.svg)]

.bold[During training], we randomly *drop* the residual tokens with a *probability $\tau$*, forcing the model to occasionally reconstruct the Mel-Spectrogram using solely the explicit attributes.

???

"To fix this laziness, we introduce a simple but highly effective solution: a dropout mechanism applied directly to our residual tokens.

As highlighted in the red box, during training, we randomly drop these tokens with a probability $\tau$. This cuts off the network's shortcut. Because the residual information is sometimes missing, the model is forced to reconstruct the audio using *solely* the explicit attributes.

This guarantees that the model actually learns to use our control factors—like pitch and identity—completely restoring our controllability."

---
class: middle
.kol-2-3[
## Regularization strategy: dropout
This plot examines how the dropout threshold ($\tau$) shapes the balance between attributes and the residual tokens

.vspace[

]
- $\tau=0$ **(Loss of Control)**: The model relies solely on residual tokens and completely ignores explicit attributes.
- $\tau=0.3$ **(Good Synergy)**: The model effectively integrates both, maximizing synthesis quality, content, and speaker similarity.
- $\tau\geq0.8$ **(Residual Drop)**: The residual tokens are largely ignored, reducing the synthesis to rely exclusively on attributes.

]
.kol-1-3[
.center.width-60[![](images/RT-MAE/ICASSP_Modern_Plots.svg)]
]

???

By applying the dropout, we find a good compromise. If you look at the dark bars, you can see that reconstructing from the attributes alone works well again. Our controllability is restored!

Finally, if we drop out too much, the residual tokens are essentially unused, and we lose their benefits.
---

class: middle

## Improving speech synthesis through the residual tokens

In this experiment, each speech signal is **first analyzed** to extract its attributes, and **then reconstructed** either using
only these attributes or with the additional information provided by the residual tokens.

.kol-1-2[
.center.width-90[![](images/RT-MAE/libri_zoom.svg)]
.caption[LibriSpeech-test results]
]
.kol-1-2[
.center.width-90[![](images/RT-MAE/emov_zoom.svg)]
.caption[EmoV-DB results]
]

.center[RT-MAE$^1$ *consistently improves* AnCoGen.]

.credit[$^1$we follow the training protocol of AnCoGen and train our model using the LibriSpeech-360 Clean dataset.]

???
Let's now look at the reconstruction results.

The grey bars represent our baseline, AnCoGen, which reconstructs the audio using only the explicit attributes. The blue bars represent our model, RT-MAE, which leverages the additional residual tokens.

The visual takeaway is very clear: whether on standard read speech like LibriSpeech on the left, or highly expressive, emotional data like EmoV-DB on the right, the blue bars consistently dominate.

This proves that capturing this unmodeled residual variance systematically improves intelligibility, speaker fidelity, and the overall naturalness of the synthesized speech.

---
class: middle

## Synergy: Attributes & Residual Tokens

Because RT-MAE relies **on masked modeling**, we can simply adjust the masking rate to selectively disable explicit attributes or residual tokens.

.kol-1-2[
.center.width-85[![](images/RT-MAE/ablation.svg)]
]
.kol-1-2[
.center.width-85[![](images/RT-MAE/legend.svg)]

<br>
- *Base:* Explicit attributes handle core synthesis.
- *Synergy (RT-MAE):* Residual tokens capture missing variance, boosting all quality metrics.
]

???
So, a critical question arises: does this residual capture redundant information, or does it truly complement our explicit attributes?

To find out, look at the radar plot. The orange line shows that explicit attributes alone handle the core synthesis. The green line shows the residual tokens acting alone, capturing specific features like speaker similarity.

But the definitive answer is the blue line: RT-MAE. Combining both pushes us to the outer boundary of every single metric. This proves the residual isn't redundant at all; it perfectly fills the gaps left by the attributes.

## Beyond Synthesis: Control & Modularity

.kol-1-2[
.bold[Preserving Controllability]
- Residual tokens do not entangle with explicit attributes.
- *Proof:* Successful pitch-shifting experiments demonstrate that explicit controls remain perfectly active and isolated.
]
.gray.kol-1-2[
.bold[Stacking Multiple Residuals]
- The RT-MAE architecture is extensible.
- Proof: We successfully stacked additional residuals, such as a dedicated residual to explicitly model background noise.
]

???
To conclude, RT-MAE has two key strengths. 

First, it preserves full controllability. Our pitch-shifting experiments prove we can still manipulate attributes independently.
